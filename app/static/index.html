<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stem Separator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <h1>Sonic<span class="highlight">Split</span></h1>
            <p>Premium AI-Powered Stem Separation</p>
        </header>

        <main>
            <div id="drop-zone" class="upload-area">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Drag & Drop your audio file here</p>
                <span>or <label for="file-upload" class="browse-btn">browse files</label></span>
                <input type="file" id="file-upload" accept="audio/*" hidden>
            </div>
            
            <div id="file-info" class="hidden">
                <p class="file-name" id="selected-file-name"></p>
                <button id="process-btn" class="primary-btn">Extract Stems</button>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing and separating audio stems...</p>
                <p class="sub-text">This will take a moment depending on the file size.</p>
            </div>

            <div id="result" class="hidden result-area">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <p>Separation Complete!</p>
                <a id="download-link" href="#" class="primary-btn success-btn">Download Stems (.zip)</a>
            </div>
            
            <div id="error-msg" class="hidden error-area">
                <p id="error-text"></p>
                <button id="retry-btn" class="secondary-btn">Try Again</button>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
