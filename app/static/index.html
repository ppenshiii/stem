<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicSplit | AI Stem Separator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <h1>Sonic<span class="highlight">Split</span></h1>
            <p>Premium AI-Powered Stem Separation</p>
        </header>

        <main>
            <!-- Drop Zone -->
            <div id="drop-zone" class="upload-area">
                <div class="icon-wrap">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <p>Drag & Drop your audio file here</p>
                <span>or <label for="file-upload" class="browse-btn">browse files</label></span>
                <input type="file" id="file-upload" accept="audio/*" hidden>
            </div>
            
            <!-- File Action State -->
            <div id="file-info" class="hidden interactive-box">
                <p class="file-name" id="selected-file-name"></p>
                <div class="action-buttons-wrap">
                    <button id="genre-btn" class="secondary-btn">Predict ML Genre</button>
                    <button id="process-btn" class="primary-btn">Extract Stems</button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading" class="hidden">
                <div class="visualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <p class="pulse-text" id="loading-header">Analyzing Audio...</p>
                <p class="sub-text" id="loading-desc">Executing Machine Learning Pipelines.</p>
            </div>

            <!-- Genre Result State -->
            <div id="genre-result" class="hidden result-area">
                <div class="genre-flex">
                    <div>
                        <p class="label-text">Model Prediction</p>
                        <p id="detected-genre" class="genre-title">Unknown</p>
                    </div>
                    
                    <!-- Confidence Circular Gauge -->
                    <div class="circular-chart-wrap">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg"
                                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" id="confidence-circle" stroke-dasharray="0, 100"
                                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage" id="confidence-text">0%</text>
                            <text x="18" y="25" class="percentage-label">Confidence</text>
                        </svg>
                    </div>
                </div>
                <button id="back-genre-btn" class="secondary-btn w-100">Back</button>
            </div>

            <!-- Stem Separator Result State -->
            <div id="result" class="hidden result-area">
                <div class="success-icon-wrap">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <p class="success-title">Separation Complete!</p>
                <a id="download-link" href="#" class="primary-btn success-btn w-100">Download Stems (.zip)</a>
                <button id="close-download-btn" class="secondary-btn w-100" style="margin-top: 10px;">Back</button>
            </div>
            
            <!-- Error State -->
            <div id="error-msg" class="hidden error-area fade-in">
                <p id="error-text"></p>
                <button id="retry-btn" class="secondary-btn w-100">Try Again</button>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
