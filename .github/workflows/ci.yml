name: Docker CI/CD - Stem Separator App

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Set up Buildx for multi-architecture builds & advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/stem-separator
          # Tag with git SHA and also tag 'latest' on main branch pushes
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile 
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Implement GitHub Actions caching for Docker layers
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/stem-separator:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/stem-separator:buildcache,mode=max

  deploy:
    name: Deploy to Self-Hosted Runner
    needs: build-and-push
    # Only deploy when not building a PR
    if: github.event_name != 'pull_request'
    runs-on: self-hosted

    steps:
      - name: Stop existing container
        continue-on-error: true
        run: docker stop sonicsplit_app

      - name: Remove existing container
        continue-on-error: true
        run: docker rm sonicsplit_app

      - name: Pull the latest Docker Image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stem-separator:latest

      - name: Run the new container
        run: |
          docker run -d \
            --name sonicsplit_app \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/stem-separator:latest
