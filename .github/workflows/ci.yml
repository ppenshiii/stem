name: Docker CI/CD - Face Recognition App

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Set up Buildx for multi-architecture builds & advanced caching (crucial for slow C++ compilations)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/face-recognition-app
          # Tag with git SHA and also tag 'latest' on main branch pushes
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Assuming you renamed it to just Dockerfile in your repo, otherwise use ./Dockerfile.face_rec
          file: ./Dockerfile 
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Implement GitHub Actions caching for Docker layers to dramatically speed up Dlib/OpenCV recompiles
          cache-from: type=gha
          cache-to: type=gha,mode=max
